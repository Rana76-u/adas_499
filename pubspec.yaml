name: adas_499
description: "ADAS object detection app — native Android TFLite backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Still-image decoding for the image tab (not used in the live camera path)
  image: ^3.3.0

  # Image picker (gallery / camera capture for static image tab)
  image_picker: ^1.2.1

  # File paths
  path_provider: ^2.1.1

  # Permissions
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    # All TFLite models — the native Kotlin code loads these via AssetManager
    - assets/models/
    # Labels file
    - assets/labels.txt
