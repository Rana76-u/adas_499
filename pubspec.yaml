name: adas_499
description: "ADAS object detection app — native Android TFLite backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera (used only by the image-picker tab now; live camera uses native CameraX)
  camera: ^0.10.5

  # Still-image decoding for the image tab
  image: ^3.3.0

  # Image picker (gallery / camera capture for static image tab)
  image_picker: ^1.2.1

  # File paths
  path_provider: ^2.1.1

  # Permissions
  permission_handler: ^11.3.0

  # State management (if used elsewhere)
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/models/yolo11n_int8.tflite
    - android/app/src/main/assets/models/yolo11n_int8.tflite
    - assets/labels.txt
